# fly.toml - Chronicle backend (single FastAPI web process, inline pipeline)
# Docs: https://fly.io/docs/reference/configuration/
#
# Architecture note: we previously ran a separate `worker` process group
# (ARQ on Upstash Redis). After a cost audit we moved to inline execution
# via FastAPI's asyncio.create_task - the worker idle cost (~$5.70/mo
# always-on) wasn't justified at single-user scale. The ARQ shim is still
# in backend/queue/tasks.py so we can flip back to a separate worker by
# adding a `worker` process group back here and scaling it >= 1.

app = "multi-agent-deep-research-api"
# Singapore - co-located with Neon's ap-southeast-1 region for low DB
# latency. Fall back to hkg or nrt if sin runs out of capacity.
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  ENVIRONMENT = "production"
  PORT = "8080"
  PYTHONPATH = "/app"

[http_service]
  internal_port = 8080
  force_https = true
  # Web scales to zero when idle. Inline research runs as part of the
  # request lifecycle, so the machine stays alive long enough to finish
  # any in-flight pipeline before stopping.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 20
    hard_limit = 25

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
  cpus = 1
  cpu_kind = "shared"
